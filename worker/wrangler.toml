name = "harvest-web-trigger"
main = "src/index.js"
compatibility_date = "2026-05-01"

[vars]
GITHUB_OWNER = "wdiazux"
GITHUB_REPO = "harvest-sheet"
WORKFLOW_FILE = "web-trigger.yml"
WORKFLOW_REF = "main"
ALLOWED_ORIGIN = "https://wdiazux.github.io"

# Built-in Workers rate limiting (free, no extra infra): 20 requests / 60s per client IP.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }
