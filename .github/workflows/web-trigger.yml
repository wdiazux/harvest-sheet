name: Web Interface Trigger

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        type: string
      to_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        type: string
      user_prefix:
        description: 'User prefix or "all"'
        required: false
        default: 'all'
        type: string
      upload_to_sheets:
        description: 'Upload to Google Sheets'
        required: false
        default: true
        type: boolean
      include_advanced_fields:
        description: 'Include advanced fields'
        required: false
        default: false
        type: boolean

jobs:
  validate-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Load credentials
        env:
          USER_CREDS: ${{ secrets.USER_CREDENTIALS }}
          GOOGLE_SA_PROJECT_ID: ${{ secrets.GOOGLE_SA_PROJECT_ID }}
          GOOGLE_SA_PRIVATE_KEY_ID: ${{ secrets.GOOGLE_SA_PRIVATE_KEY_ID }}
          GOOGLE_SA_PRIVATE_KEY: ${{ secrets.GOOGLE_SA_PRIVATE_KEY }}
          GOOGLE_SA_CLIENT_EMAIL: ${{ secrets.GOOGLE_SA_CLIENT_EMAIL }}
          GOOGLE_SA_CLIENT_ID: ${{ secrets.GOOGLE_SA_CLIENT_ID }}
        run: |
          set -euo pipefail
          # Load Google Service Account credentials
          if [ -n "$GOOGLE_SA_PROJECT_ID" ]; then
            # Mask Google Service Account credentials
            echo "::add-mask::$GOOGLE_SA_PROJECT_ID"
            echo "::add-mask::$GOOGLE_SA_PRIVATE_KEY_ID"
            echo "::add-mask::$GOOGLE_SA_PRIVATE_KEY"
            echo "::add-mask::$GOOGLE_SA_CLIENT_EMAIL"
            echo "::add-mask::$GOOGLE_SA_CLIENT_ID"

            {
              echo "GOOGLE_SA_PROJECT_ID=$GOOGLE_SA_PROJECT_ID"
              echo "GOOGLE_SA_PRIVATE_KEY_ID=$GOOGLE_SA_PRIVATE_KEY_ID"
              echo "GOOGLE_SA_PRIVATE_KEY=$GOOGLE_SA_PRIVATE_KEY"
              echo "GOOGLE_SA_CLIENT_EMAIL=$GOOGLE_SA_CLIENT_EMAIL"
              echo "GOOGLE_SA_CLIENT_ID=$GOOGLE_SA_CLIENT_ID"
            } >> "$GITHUB_ENV"
          fi

          # Load user credentials dynamically from JSON secret (suppress output)
          if [ -z "$USER_CREDS" ]; then
            echo "❌ Configuration error"
            exit 1
          fi

          # Mask all user credentials to prevent exposure in logs
          echo "$USER_CREDS" | jq -r '.users[] |
            "::add-mask::\(.harvest_account_id)\n" +
            "::add-mask::\(.harvest_auth_token)\n" +
            "::add-mask::\(.harvest_user_agent)\n" +
            "::add-mask::\(.harvest_user_id)\n" +
            "::add-mask::\(.google_sheet_id)\n" +
            "::add-mask::\(.google_sheet_tab_name)"
          '

          # Parse JSON and create environment variables for each user
          echo "$USER_CREDS" | jq -r '.users[] |
            "\(.prefix)_HARVEST_ACCOUNT_ID=\(.harvest_account_id)\n" +
            "\(.prefix)_HARVEST_AUTH_TOKEN=\(.harvest_auth_token)\n" +
            "\(.prefix)_HARVEST_USER_AGENT=\(.harvest_user_agent)\n" +
            "\(.prefix)_HARVEST_USER_ID=\(.harvest_user_id)\n" +
            "\(.prefix)_GOOGLE_SHEET_ID=\(.google_sheet_id)\n" +
            "\(.prefix)_GOOGLE_SHEET_TAB_NAME=\(.google_sheet_tab_name)"
          ' >> "$GITHUB_ENV"

          echo "✅ Environment configured"

      - name: Run Harvest script
        id: harvest
        env:
          FROM_DATE: ${{ inputs.from_date }}
          TO_DATE: ${{ inputs.to_date }}
          USER_PREFIX: ${{ inputs.user_prefix }}
          UPLOAD_TO_GOOGLE_SHEET: ${{ inputs.upload_to_sheets }}
          INCLUDE_ADVANCED_FIELDS: ${{ inputs.include_advanced_fields }}
        run: |
          set -uo pipefail
          # Validate dates from env vars (never interpolate untrusted input into the shell)
          [[ "$FROM_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || { echo "❌ bad from_date"; exit 1; }
          [[ "$TO_DATE"   =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || { echo "❌ bad to_date"; exit 1; }

          # Build command arguments
          ARGS="--from-date $FROM_DATE --to-date $TO_DATE"
          if [ "$USER_PREFIX" != "all" ]; then
            SAFE_PREFIX="$(printf '%s' "$USER_PREFIX" | tr -cd 'A-Za-z0-9_')"
            ARGS="$ARGS --user $SAFE_PREFIX"
          fi

          # Run the script to completion (output suppressed for security, data goes to Google Sheets)
          # Must run to completion to ensure Google Sheets upload happens
          python convert_harvest_json_to_csv.py $ARGS > /dev/null 2>&1
          SCRIPT_EXIT_CODE=$?

          if [ $SCRIPT_EXIT_CODE -eq 0 ]; then
            echo "✅ Script completed successfully"
            echo "script_completed=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Script failed with exit code: $SCRIPT_EXIT_CODE"
            exit $SCRIPT_EXIT_CODE
          fi

      - name: Create job summary
        if: always()
        env:
          SCRIPT_COMPLETED: ${{ steps.harvest.outputs.script_completed }}
        run: |
          echo "# Harvest Export Job Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$SCRIPT_COMPLETED" = "true" ]; then
            echo "✅ **Status:** Completed successfully" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "📊 **Data uploaded to Google Sheets**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "🔒 **Security:**" >> "$GITHUB_STEP_SUMMARY"
            echo "- All credentials are masked in workflow logs" >> "$GITHUB_STEP_SUMMARY"
            echo "- No local artifacts created (data only in Google Sheets)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Workflow logs auto-deleted within 1-7 hours" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ **Status:** Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Please check the workflow logs for error details." >> "$GITHUB_STEP_SUMMARY"
          fi
